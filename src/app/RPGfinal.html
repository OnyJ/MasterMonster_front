<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Game Test</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #222;
      flex-direction: column;
    }
    canvas {
      background: #111;
      display: block;
      border: 2px solid #555;
    }
    #gameOverScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      font-size: 24px;
      z-index: 10;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="gameOverScreen">
  <div>Game Over</div>
  <button onclick="restartGame()">Rejouer</button>
</div>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<script>

// Crée un joueur ou monstre avec position, vie, dégâts et vitesse
function createEntity(x, y, hp, damage, speed) {
  return {
    x,
    y,
    hp,
    maxHp: hp,
    damage,
    speed,
    isAlive: true,
    attackAngle: 0,
    attackRadius: 30,
    idleTimer: 0,
    originalX: x,
    originalY: y,
    targetX: x,
    targetY: y,
    attackCooldown: 0
  };
}

// Calcule la distance entre deux entités
function getDistance(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  return Math.sqrt(dx * dx + dy * dy);
}

// Vérifie si une cible est dans une certaine portée
function isInRange(source, target, range = 100) {
  return getDistance(source, target) < range;
}

// Déplace une entité vers une cible en respectant la vitesse
function moveEntityTowards(entity, targetX, targetY) {
  const angle = Math.atan2(targetY - entity.y, targetX - entity.x);
  entity.x += Math.cos(angle) * entity.speed;
  entity.y += Math.sin(angle) * entity.speed;
  clampToCanvas(entity);
}

// Met à jour le comportement d'un monstre
function updateMonster(monster, player) {
  if (!monster.isAlive) return;
  if (isInRange(monster, player)) {
    moveEntityTowards(monster, player.x, player.y);
  } else {
    if (monster.idleTimer <= 0) {
      monster.targetX = monster.originalX + (Math.random() - 0.5) * 100;
      monster.targetY = monster.originalY + (Math.random() - 0.5) * 100;
      monster.idleTimer = 100;
    } else {
      moveEntityTowards(monster, monster.targetX, monster.targetY);
      monster.idleTimer--;
    }
  }
}

// Gère les attaques des monstres sur le joueur
function tryAttack(monster, player) {
  if (!monster.isAlive || !player.isAlive) return;
  if (isInRange(monster, player, 20)) {
    if (monster.attackCooldown <= 0) {
      player.hp -= monster.damage;
      monster.attackCooldown = 60;
      if (player.hp <= 0) {
        player.isAlive = false;
        player.hp = 0;
        gameOver();
      }
    } else {
      monster.attackCooldown--;
    }
  }
}

// Gère l'attaque en cercle (flamme tournante + contact direct)
function performCircularAttack(player, monsters) {
  if (!player.isAlive) return;
  if (player.attackTimer === undefined) {
    player.attackTimer = setInterval(() => {
      if (!player.isAlive) return;

      monsters.forEach(monster => {
        if (!monster.isAlive) return;

        // Attaque avec la flamme
        const flameX = player.x + Math.cos(player.attackAngle) * player.attackRadius;
        const flameY = player.y + Math.sin(player.attackAngle) * player.attackRadius;
        const flameHit = getDistance({x: flameX, y: flameY}, monster) < 60;

        // Attaque si le joueur touche le monstre directement
        const bodyHit = getDistance(player, monster) < 15;

        if (flameHit || bodyHit) {
          monster.hp -= player.damage;
          if (monster.hp <= 0) {
            monster.hp = 0;
            monster.isAlive = false;
          }
        }
      });
    }, 300);
  }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gameOverScreen = document.getElementById('gameOverScreen');

let player;
let monsters = [];
let gameInterval;

// Fait apparaître un monstre à l'intérieur des bords
function spawnMonster() {
  const padding = 20;
  const x = Math.random() * (canvas.width - 2 * padding) + padding;
  const y = Math.random() * (canvas.height - 2 * padding) + padding;
  monsters.push(createEntity(x, y, 30, 5, 1));
}

// Gère la fin de la partie
function gameOver() {
  gameOverScreen.style.display = 'flex';
  clearInterval(gameInterval);
  if (player.attackTimer) clearInterval(player.attackTimer);
}

// Redémarre une nouvelle partie
function restartGame() {
  gameOverScreen.style.display = 'none';
  player = createEntity(300, 200, 100, 10, 4);
  monsters = [];
  spawnMonster();
  spawnMonster();
  mouseX = player.x;
  mouseY = player.y;
  player.attackTimer = undefined;
  gameInterval = setInterval(spawnMonster, 3000);
  requestAnimationFrame(gameLoop);
}

let mouseX = 300;
let mouseY = 200;

// Déplacement du joueur à la souris
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

// Empêche une entité de sortir du canvas
function clampToCanvas(entity) {
  const radius = 10;
  entity.x = Math.max(radius, Math.min(canvas.width - radius, entity.x));
  entity.y = Math.max(radius, Math.min(canvas.height - radius, entity.y));
}

// Met à jour toutes les entités
function update() {
  if (!player.isAlive) return;
  moveEntityTowards(player, mouseX, mouseY);
  monsters.forEach(monster => {
    updateMonster(monster, player);
    tryAttack(monster, player);
  });
  performCircularAttack(player, monsters);
  player.attackAngle += 0.1;
}

// Dessine un personnage ou un monstre
function drawEntity(entity, color) {
  ctx.fillStyle = entity.isAlive ? color : 'gray';
  ctx.beginPath();
  ctx.arc(entity.x, entity.y, 10, 0, Math.PI * 2);
  ctx.fill();

  // Barre de vie
  ctx.fillStyle = 'red';
  ctx.fillRect(entity.x - 15, entity.y - 20, 30, 5);
  ctx.fillStyle = 'lime';
  const hpRatio = entity.hp / entity.maxHp;
  ctx.fillRect(entity.x - 15, entity.y - 20, 30 * hpRatio, 5);
}

// Dessine la flamme qui tourne autour du joueur
function drawRotatingFlame(player) {
  const flameX = player.x + Math.cos(player.attackAngle) * player.attackRadius;
  const flameY = player.y + Math.sin(player.attackAngle) * player.attackRadius;
  ctx.fillStyle = 'orange';
  ctx.beginPath();
  ctx.arc(flameX, flameY, 3, 0, Math.PI * 2);
  ctx.fill();
}

// Dessine tous les éléments
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (player.isAlive) drawEntity(player, 'blue');
  drawRotatingFlame(player);
  monsters.forEach(monster => drawEntity(monster, 'green'));
}

// Boucle principale du jeu
function gameLoop() {
  update();
  draw();
  if (player.isAlive) requestAnimationFrame(gameLoop);
}

restartGame();
</script>
</body>
</html>
